syntax = "proto3";

package agntcoin.agntcoin.v1;

import "agntcoin/agntcoin/v1/params.proto";
import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/zoltankiss/agntcoin/x/agntcoin/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // Register defines the Register RPC.
  rpc Register(MsgRegister) returns (MsgRegisterResponse);

  // Faucet defines the Faucet RPC.
  rpc Faucet(MsgFaucet) returns (MsgFaucetResponse);

  // Transfer defines the Transfer RPC.
  rpc Transfer(MsgTransfer) returns (MsgTransferResponse);

  // Castvouch defines the Castvouch RPC.
  rpc Castvouch(MsgCastvouch) returns (MsgCastvouchResponse);

  // LockEscrow defines the LockEscrow RPC.
  rpc LockEscrow(MsgLockEscrow) returns (MsgLockEscrowResponse);

  // ReleaseEscrow defines the ReleaseEscrow RPC.
  rpc ReleaseEscrow(MsgReleaseEscrow) returns (MsgReleaseEscrowResponse);

  // RefundEscrow defines the RefundEscrow RPC.
  rpc RefundEscrow(MsgRefundEscrow) returns (MsgRefundEscrowResponse);

  // SubmitEscrow: the payee marks the escrow delivered, locking out refund.
  rpc SubmitEscrow(MsgSubmitEscrow) returns (MsgSubmitEscrowResponse);

  // DisputeEscrow: the payer contests submitted work, freezing auto-release.
  rpc DisputeEscrow(MsgDisputeEscrow) returns (MsgDisputeEscrowResponse);

  // Unvouch defines the Unvouch RPC.
  rpc Unvouch(MsgUnvouch) returns (MsgUnvouchResponse);

  // OpenDispute opens a k-of-n jury case against a submitted/disputed escrow.
  rpc OpenDispute(MsgOpenDispute) returns (MsgOpenDisputeResponse);

  // CastVote records an eligible juror's verdict on an open dispute.
  rpc CastVote(MsgCastVote) returns (MsgCastVoteResponse);

  // ResolveDispute tallies the jury and settles the underlying escrow.
  rpc ResolveDispute(MsgResolveDispute) returns (MsgResolveDisputeResponse);

  // PostBond locks slashable collateral behind a claim/behavior.
  rpc PostBond(MsgPostBond) returns (MsgPostBondResponse);

  // ReleaseBond (slasher only) exonerates a bond, refunding the poster.
  rpc ReleaseBond(MsgReleaseBond) returns (MsgReleaseBondResponse);

  // SlashBond (slasher only) punishes a bond, paying the beneficiary (or burning).
  rpc SlashBond(MsgSlashBond) returns (MsgSlashBondResponse);

  // AttestEscrow: a named verifier posts its staked pass/fail verdict on a
  // submitted verifier-bound escrow.
  rpc AttestEscrow(MsgAttestEscrow) returns (MsgAttestEscrowResponse);

  // VerifiedRelease settles a verifier-attested escrow: quorum of staked pass
  // attestations + key preimage => pay the payee and reveal the key atomically.
  rpc VerifiedRelease(MsgVerifiedRelease) returns (MsgVerifiedReleaseResponse);

  // ReclaimAttestationBonds frees attestation stakes once the challenge window
  // has passed uncontested.
  rpc ReclaimAttestationBonds(MsgReclaimAttestationBonds) returns (MsgReclaimAttestationBondsResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "agntcoin/x/agntcoin/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgRegister defines the MsgRegister message.
message MsgRegister {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgRegisterResponse defines the MsgRegisterResponse message.
message MsgRegisterResponse {}

// MsgFaucet defines the MsgFaucet message.
message MsgFaucet {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgFaucetResponse defines the MsgFaucetResponse message.
message MsgFaucetResponse {}

// MsgTransfer defines the MsgTransfer message.
message MsgTransfer {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string to_addr = 2;
  uint64 amount = 3;
  string memo = 4;
}

// MsgTransferResponse defines the MsgTransferResponse message.
message MsgTransferResponse {}

// MsgCastvouch defines the MsgCastvouch message.
message MsgCastvouch {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string to_addr = 2;
  uint64 weight = 3;
  // stake is the amount of ag3nt to lock behind this vouch. Must be at least
  // MinVouchStake and the voucher must have a sufficient balance.
  uint64 stake = 4;
}

// MsgCastvouchResponse defines the MsgCastvouchResponse message.
message MsgCastvouchResponse {}

// MsgUnvouch removes the caller's vouch for to_addr and returns the locked
// stake to the caller's balance.
message MsgUnvouch {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string to_addr = 2;
}

// MsgUnvouchResponse defines the MsgUnvouchResponse message.
message MsgUnvouchResponse {}

// MsgLockEscrow defines the MsgLockEscrow message.
message MsgLockEscrow {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string payee = 2;
  uint64 amount = 3;
  string ref = 4;
  uint64 dispute_seconds = 5;
  // no_auto_release marks the escrow jury-bound: the payee can never self-release
  // (even past the deadline) — un-verifiable work settles via the jury. Set this
  // for no-test / prose tasks (it13 finding #19). Default false = ordinary escrow.
  // Forced TRUE when verifier_addrs is non-empty (a verifier-bound escrow that
  // kept the clock path would let the payee skip the verifier entirely).
  bool no_auto_release = 6;
  // verifier_addrs: the named verifier set (verifier-v1). Non-empty makes the
  // escrow verifier-bound: a quorum of staked pass-attestations becomes a
  // release authority alongside the payer and the jury.
  repeated string verifier_addrs = 7;
  // verifier_quorum: how many distinct pass-attestations VerifiedRelease needs.
  // Required >= 1 and <= len(verifier_addrs) when verifiers are named.
  uint64 verifier_quorum = 8;
  // acceptance_hash: hex sha256 precommitting the acceptance criteria (tests +
  // hermetic environment spec) so goalposts can't move after funding.
  string acceptance_hash = 9;
}

// MsgLockEscrowResponse defines the MsgLockEscrowResponse message.
message MsgLockEscrowResponse {
  uint64 id = 1;
}

// MsgReleaseEscrow defines the MsgReleaseEscrow message.
message MsgReleaseEscrow {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

// MsgReleaseEscrowResponse defines the MsgReleaseEscrowResponse message.
message MsgReleaseEscrowResponse {}

// MsgRefundEscrow defines the MsgRefundEscrow message.
message MsgRefundEscrow {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

// MsgRefundEscrowResponse defines the MsgRefundEscrowResponse message.
message MsgRefundEscrowResponse {}

// MsgSubmitEscrow: the payee marks a locked escrow as delivered/submitted, which
// blocks the payer from refunding (only release, or post-deadline auto-release,
// remain). Fair-exchange: the worker can reveal delivered work without the buyer
// clawing the payment back.
message MsgSubmitEscrow {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
  // delivery_hash: hex sha256 of the delivered artifact, pinning the exhibit the
  // jury will judge on-chain so it can't be altered after submission. Optional.
  string delivery_hash = 3;
  // key_hash: hex sha256 of the symmetric key the artifact ciphertext was
  // encrypted with (verifier-v1 fair exchange). VerifiedRelease must present the
  // preimage, which the release event publishes — so the buyer can only ever
  // read the plaintext in the same tx that pays the seller. Optional for
  // ordinary escrows; REQUIRED (with delivery_hash) for verifier-bound ones —
  // a key-less verifier deal silently downgrades the fair exchange back to
  // custodial trust, which is the exact hole the primitive exists to close.
  string key_hash = 4;
  // artifact_uri: content-addressable pointer to the artifact ciphertext
  // (evidence availability — jurors fetch from here and re-hash against
  // delivery_hash instead of trusting a mutable app DB). Optional.
  string artifact_uri = 5;
}

// MsgSubmitEscrowResponse defines the MsgSubmitEscrowResponse message.
message MsgSubmitEscrowResponse {}

// MsgDisputeEscrow: the payer contests a SUBMITTED escrow (delivered work it
// judges bad), freezing it — no auto-release, no refund. The payer may still
// release (concede); otherwise it stays frozen pending resolution (a future
// k-of-n jury). The deadlock plus buyer-reputation deters abuse by either side.
message MsgDisputeEscrow {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

// MsgDisputeEscrowResponse defines the MsgDisputeEscrowResponse message.
message MsgDisputeEscrowResponse {}

// MsgOpenDispute opens a k-of-n jury case against an escrow whose acceptability
// can't be settled by an objective test (or is contested). Only the escrow's
// payer or payee may open it; the escrow is frozen until the jury resolves it.
message MsgOpenDispute {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 escrow_id = 2;
  string reason = 3;
  // bond_amount: the slashable dispute-bond the opener posts (>= MinDisputeBond).
  // Opening a dispute is no longer free — a frivolous/lost dispute slashes this
  // to the griefed counterparty; an upheld one returns it. Deters cry-wolf +
  // jury-DDoS (it18 RED → the it19 GREEN benchmark).
  uint64 bond_amount = 4;
}

// MsgOpenDisputeResponse returns the new dispute id.
message MsgOpenDisputeResponse { uint64 id = 1; }

// MsgCastVote records an eligible juror's verdict on an open dispute. Juror
// eligibility at genesis = membership in Params.Anchors (the founder/trust
// roots); one vote per juror. accept=true => release to payee (work accepted);
// accept=false => refund to payer (work rejected).
message MsgCastVote {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 dispute_id = 2;
  bool accept = 3;
  // stake_amount: the slashable juror-stake the juror posts WITH this vote
  // (>= MinJurorStake). Voting is no longer free — a juror coherent with the
  // resolved verdict gets it back, one incoherent with it is slashed to the
  // wronged party. Deters a colluding juror (jury-v1; it20). Combined with the
  // quorum requirement in ResolveDispute, it also blocks a single-juror 1-0 rush.
  uint64 stake_amount = 4;
}

// MsgCastVoteResponse defines the MsgCastVote response.
message MsgCastVoteResponse {}

// MsgResolveDispute tallies the votes on an open dispute once a quorum of
// eligible jurors has voted, and settles the underlying escrow
// (accept => release to payee, reject => refund to payer).
message MsgResolveDispute {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 dispute_id = 2;
}

// MsgResolveDisputeResponse returns the resolution ("accept" | "reject").
message MsgResolveDisputeResponse { string resolution = 1; }

// MsgPostBond locks `amount` of the creator's balance as slashable collateral.
// `slasher` is the only address that may later release or slash it — the
// poster can NEVER self-withdraw (the deterrent). Willingness to post a bond
// at reputation 0 is the cold-start sincerity signal (it10 finding #17).
message MsgPostBond {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 amount = 2;
  string purpose = 3;
  string slasher = 4; // address authorised to release/slash
  string ref = 5;
}

// MsgPostBondResponse returns the new bond id.
message MsgPostBondResponse { uint64 id = 1; }

// MsgReleaseBond exonerates an active bond: collateral returns to the poster.
// creator MUST equal bond.slasher — in particular the poster's own
// ReleaseBond is rejected (no self-withdraw).
message MsgReleaseBond {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

// MsgReleaseBondResponse defines the MsgReleaseBond response.
message MsgReleaseBondResponse {}

// MsgSlashBond punishes an active bond: collateral goes to `beneficiary`
// (e.g. the buyer a ghosting worker stranded), or is burned if empty.
// creator MUST equal bond.slasher.
message MsgSlashBond {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
  string beneficiary = 3; // empty = burn (deliberate supply decrease)
}

// MsgSlashBondResponse defines the MsgSlashBond response.
message MsgSlashBondResponse {}

// MsgAttestEscrow records a named verifier's verdict on a SUBMITTED
// verifier-bound escrow: "I ran the precommitted tests (acceptance_hash)
// against the committed delivery (delivery_hash/key_hash); they
// passed/failed." The verifier's own tx signature is the attestation
// authority — deterministic proto signing, no detached canonical-JSON
// signature to get wrong. The verdict must be backed by a slashable
// ATTESTATION-STAKE >= the escrow amount, posted per attestation (so N
// concurrent deals lock N stakes — a shared standing bond can never
// over-promise). passed=true counts toward the VerifiedRelease quorum;
// passed=false moves the escrow to fail_attested and opens the payee's
// contest window (refund unlocks only after it passes uncontested).
message MsgAttestEscrow {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 escrow_id = 2;
  bool passed = 3;
  uint64 stake_amount = 4;
  // The verifier RESTATES what it judged; the chain rejects any mismatch with
  // the escrow's commitments (unpinned-procedure guard). An attestation that
  // names different tests (acceptance_hash), different bytes (delivery_hash)
  // or a different key commitment (key_hash) than the escrow record cannot
  // land, so a verdict can never be silently re-bound to a procedure or
  // artifact the verifier did not check.
  string delivery_hash = 5;
  string key_hash = 6;
  string acceptance_hash = 7;
}

// MsgAttestEscrowResponse returns the attestation-stake bond id.
message MsgAttestEscrowResponse { uint64 bond_id = 1; }

// MsgVerifiedRelease settles a verifier-attested escrow without the payer:
// anyone may submit it (the staked attestations are the authority, not the
// submitter). Requires a quorum of pass-attestations and, if the payee
// committed a key_hash, the key preimage — the payee is paid and the key is
// emitted in the release event in ONE tx (atomic fair exchange: the buyer
// can't read the plaintext without the seller getting paid). Opens the
// challenge window: until escrow.challenge_deadline the payer may OpenDispute
// a fraud claim, recoverable from the attesters' stakes.
message MsgVerifiedRelease {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 escrow_id = 2;
  // key: preimage of the escrow's key_hash (the artifact decryption key).
  // Must be empty when no key_hash was committed.
  string key = 3;
}

// MsgVerifiedReleaseResponse defines the MsgVerifiedRelease response.
message MsgVerifiedReleaseResponse {}

// MsgReclaimAttestationBonds releases the attestation-stakes of a settled
// escrow whose challenge window passed uncontested (or that the payer settled
// directly, in which case no window ever opened). Permissionless trigger —
// the chain has no end-blocker sweep, so freeing locked stakes is a tx, like
// ResolveDispute. A challenged escrow settles its stakes through the jury
// verdict instead (coherent => released, incoherent => slashed).
message MsgReclaimAttestationBonds {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 escrow_id = 2;
}

// MsgReclaimAttestationBondsResponse defines the response.
message MsgReclaimAttestationBondsResponse {}
