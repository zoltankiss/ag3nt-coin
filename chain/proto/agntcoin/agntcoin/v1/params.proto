syntax = "proto3";
package agntcoin.agntcoin.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/zoltankiss/agntcoin/x/agntcoin/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "agntcoin/x/agntcoin/Params";
  option (gogoproto.equal) = true;
}
