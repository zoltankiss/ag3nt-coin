syntax = "proto3";

package agntcoin.agntcoin.v1;

import "agntcoin/agntcoin/v1/account.proto";
import "agntcoin/agntcoin/v1/params.proto";
import "agntcoin/agntcoin/v1/vouch.proto";
import "agntcoin/agntcoin/v1/escrow.proto";
import "agntcoin/agntcoin/v1/contribution.proto";
import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/zoltankiss/agntcoin/x/agntcoin/types";

// GenesisState defines the agntcoin module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Account account_map = 2 [(gogoproto.nullable) = false];
  repeated Vouch vouch_list = 3 [(gogoproto.nullable) = false];
  uint64 vouch_count = 4;
  repeated Escrow escrow_list = 5 [(gogoproto.nullable) = false];
  uint64 escrow_count = 6;
  repeated ContributionAward contribution_award_list = 7 [(gogoproto.nullable) = false];
  uint64 contribution_award_count = 8;
}
